<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>遊び計画キメ太郎</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #f3f4f6;
      margin: 0;
      padding: 0;
      padding-bottom: 80px;
    }

    /* ヘッダー */
    .header {
      background: white;
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #e5e7eb;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header h1 { margin: 0; font-size: 18px; color: #1f2937; }
    
    .admin-btn {
      display: none; 
      background: #ef4444;
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
      cursor: pointer;
    }

    /* メインエリア */
    .container { padding: 16px; max-width: 500px; margin: 0 auto; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* カード */
    .card {
      background: white;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      margin-bottom: 16px;
    }

    /* --- 月間カレンダーUI --- */
    .calendar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .calendar-header h3 { margin: 0; font-size: 16px; }
    .month-btn {
      background: #f3f4f6;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 6px 12px;
      cursor: pointer;
      font-weight: bold;
    }
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      text-align: center;
    }
    .weekday {
      font-size: 12px;
      font-weight: bold;
      color: #6b7280;
      padding: 6px 0;
    }
    .weekday.sun { color: #ef4444; }
    .weekday.sat { color: #3b82f6; }
    
    .day-cell {
      padding: 10px 0;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      background: #f9fafb;
      border: 1px solid transparent;
    }
    .day-cell:hover { background: #e0e7ff; }
    .day-cell.selected {
      background: #4f46e5;
      color: white;
      font-weight: bold;
    }
    .day-cell.empty { background: transparent; cursor: default; }

    /* 時間選択パネル（初期状態は隠す） */
    .time-selector-panel {
      display: none;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      padding: 16px;
      border-radius: 12px;
      margin-top: 16px;
    }
    .input-style {
      width: 100%;
      padding: 10px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 14px;
    }
    .status-btn-group {
      display: flex;
      gap: 10px;
      margin: 12px 0;
    }
    .status-btn {
      flex: 1;
      padding: 10px;
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      background: white;
      font-weight: bold;
      cursor: pointer;
    }
    .status-btn.ok.active { background: #d1fae5; border-color: #10b981; color: #047857; }
    .status-btn.ng.active { background: #fee2e2; border-color: #ef4444; color: #b91c1c; }
    .add-time-btn {
      width: 100%;
      background: #4f46e5;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }

    /* 判定結果リスト */
    .schedule-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 8px;
      font-weight: bold;
    }
    .schedule-item.status-ok { background: #d1fae5; color: #047857; border-left: 5px solid #10b981; }
    .schedule-item.status-ng { background: #fee2e2; color: #b91c1c; border-left: 5px solid #ef4444; }

    /* 下部ナビゲーション */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 65px;
      background: white;
      display: flex;
      border-top: 1px solid #e5e7eb;
      z-index: 100;
    }
    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #9ca3af;
      font-size: 11px;
      cursor: pointer;
      border: none;
      background: none;
    }
    .nav-item .icon { font-size: 20px; margin-bottom: 2px; }
    .nav-item.active { color: #4f46e5; font-weight: bold; }

    /* フィルターボタン */
    .filter-group {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding-bottom: 8px;
      margin-bottom: 12px;
    }
    .filter-btn {
      background: #f3f4f6;
      border: 1px solid #d1d5db;
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
    }
    .filter-btn.active {
      background: #4f46e5;
      color: white;
      border-color: #4f46e5;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>🎉 遊び計画キメ太郎</h1>
    <button id="adminBtn" class="admin-btn" onclick="openAdmin()">🔒 管理者画面</button>
  </div>

  <div class="container">

    <!-- 1. カレンダータブ -->
    <div id="calendarTab" class="tab-content active">
      <div class="card">
        <h2>📅 日程の選択</h2>
        
        <!-- 月間カレンダーヘッダー -->
        <div class="calendar-header">
          <button class="month-btn" onclick="changeMonth(-1)">＜</button>
          <h3 id="currentMonthTitle">2026年 7月</h3>
          <button class="month-btn" onclick="changeMonth(1)">＞</button>
        </div>

        <!-- カレンダーグリッド -->
        <div class="calendar-grid">
          <div class="weekday sun">日</div>
          <div class="weekday">月</div>
          <div class="weekday">火</div>
          <div class="weekday">水</div>
          <div class="weekday">木</div>
          <div class="weekday">金</div>
          <div class="weekday sat">土</div>
        </div>
        <div id="calendarDays" class="calendar-grid"></div>

        <!-- 日付タップ後に表示される入力パネル -->
        <div id="timeSelectorPanel" class="time-selector-panel">
          <h3 id="selectedDateTitle" style="margin-top:0; font-size:15px; color:#4f46e5;">選択中: --</h3>
          
          <label style="font-size: 12px; font-weight: bold; color: #6b7280;">時間帯を選択</label>
          <div style="display: flex; align-items: center; gap: 8px; margin-top: 4px;">
            <input type="time" id="startTime" class="input-style" value="13:00">
            <span>〜</span>
            <input type="time" id="endTime" class="input-style" value="17:00">
          </div>

          <div class="status-btn-group">
            <button id="btnOk" class="status-btn ok active" onclick="setStatus('ok')">🟢 予定なし（空き）</button>
            <button id="btnNg" class="status-btn ng" onclick="setStatus('ng')">🔴 予定あり（NG）</button>
          </div>

          <button class="add-time-btn" onclick="addSchedule()">この時間帯を追加・判定する</button>
        </div>

        <!-- 判定結果一覧表示 -->
        <h3 style="margin-top: 24px;">📊 判定結果一覧</h3>
        <div id="scheduleList">
          <p style="color: #9ca3af; font-size: 13px;">まだ時間帯が追加されていません。</p>
        </div>

      </div>
    </div>

    <!-- 2. ルーレットタブ -->
    <div id="rouletteTab" class="tab-content">
      <div class="card">
        <h2>🎰 行き先ルーレット</h2>
        <p>ここに確率手動設定 / 自動均等割りのルーレットが入ります。</p>
      </div>
    </div>

    <!-- 3. レビュータブ -->
    <div id="reviewTab" class="tab-content">
      <div class="card">
        <h2>💬 ご意見・レビュー</h2>
        <p>ここに来場者や友達が★評価やコメントを送る入力フォームが入ります。</p>
      </div>
    </div>

    <!-- 4. 【作者専用】管理者画面 -->
    <div id="adminTab" class="tab-content">
      <div class="card">
        <h2>📊 レビュー管理（作者専用）</h2>
        <div class="filter-group">
          <button class="filter-btn active" onclick="filterReviews('all')">すべて</button>
          <button class="filter-btn" onclick="filterReviews(5)">★5のみ</button>
          <button class="filter-btn" onclick="filterReviews(4)">★4のみ</button>
          <button class="filter-btn" onclick="filterReviews(3)">★3のみ</button>
          <button class="filter-btn" onclick="filterReviews(2)">★2のみ</button>
          <button class="filter-btn" onclick="filterReviews(1)">★1のみ</button>
        </div>
        <div id="reviewList">
          <p style="color: #6b7280;">ここに届いたレビューが並びます。</p>
        </div>
      </div>
    </div>

  </div>

  <!-- 下部タブ -->
  <div class="bottom-nav">
    <button class="nav-item active" onclick="switchTab('calendarTab', this)">
      <span class="icon">📅</span>
      <span>カレンダー</span>
    </button>
    <button class="nav-item" onclick="switchTab('rouletteTab', this)">
      <span class="icon">🎰</span>
      <span>ルーレット</span>
    </button>
    <button class="nav-item" onclick="switchTab('reviewTab', this)">
      <span class="icon">💬</span>
      <span>レビュー</span>
    </button>
  </div>

  <script>
    // --- 1. 基本設定＆タブ切り替え ---
    function switchTab(tabId, btnElement) {
      document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
      document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));

      document.getElementById(tabId).classList.add('active');
      if (btnElement) btnElement.classList.add('active');
    }

    window.onload = function() {
      const urlParams = new URLSearchParams(window.location.search);
      if (urlParams.get('admin') === 'secret99') {
        localStorage.setItem('isAppAdmin', 'true');
        alert('🎉 管理者権限を有効化しました！');
      }

      if (localStorage.getItem('isAppAdmin') === 'true') {
        document.getElementById('adminBtn').style.display = 'block';
      }

      renderCalendar();
    };

    function openAdmin() { switchTab('adminTab', null); }
    function filterReviews(star) {
      document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');
    }

    // --- 2. Googleカレンダー風 月間カレンダー処理 ---
    let currentDate = new Date();
    let selectedFullDate = null;

    function renderCalendar() {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();

      // ヘッダーの年月表示を更新
      document.getElementById('currentMonthTitle').innerText = `${year}年 ${month + 1}月`;

      const firstDay = new Date(year, month, 1).getDay();
      const lastDate = new Date(year, month + 1, 0).getDate();

      const daysContainer = document.getElementById('calendarDays');
      daysContainer.innerHTML = '';

      // 月初の空白セル
      for (let i = 0; i < firstDay; i++) {
        daysContainer.innerHTML += `<div class="day-cell empty"></div>`;
      }

      // 日付セル
      for (let date = 1; date <= lastDate; date++) {
        const dateString = `${year}-${String(month + 1).padStart(2, '0')}-${String(date).padStart(2, '0')}`;
        const isSelected = selectedFullDate === dateString ? 'selected' : '';
        
        daysContainer.innerHTML += `
          <div class="day-cell ${isSelected}" onclick="selectDate('${dateString}', this)">
            ${date}
          </div>
        `;
      }
    }

    // 「＜」「＞」で月を移動する
    function changeMonth(delta) {
      currentDate.setMonth(currentDate.getMonth() + delta);
      renderCalendar();
    }

    // 日付をタップした時
    function selectDate(dateStr, element) {
      selectedFullDate = dateStr;

      // 見た目の選択状態を更新
      document.querySelectorAll('.day-cell').forEach(cell => cell.classList.remove('selected'));
      element.classList.add('selected');

      // 入力パネルを表示
      document.getElementById('selectedDateTitle').innerText = `📅 選択中: ${dateStr}`;
      document.getElementById('timeSelectorPanel').style.display = 'block';
    }

    // --- 3. 時間＆予定ありなし登録処理 ---
    let currentStatus = 'ok';
    const scheduleData = [];

    function setStatus(status) {
      currentStatus = status;
      const btnOk = document.getElementById('btnOk');
      const btnNg = document.getElementById('btnNg');

      if (status === 'ok') {
        btnOk.classList.add('active');
        btnNg.classList.remove('active');
      } else {
        btnNg.classList.add('active');
        btnOk.classList.remove('active');
      }
    }

    function addSchedule() {
      const start = document.getElementById('startTime').value;
      const end = document.getElementById('endTime').value;

      if (!selectedFullDate || !start || !end) {
        alert('日付と時間を正しく選択してください');
        return;
      }

      const newItem = {
        id: Date.now(),
        date: selectedFullDate,
        time: `${start} 〜 ${end}`,
        status: currentStatus
      };
      scheduleData.push(newItem);

      renderSchedules();
    }

    function renderSchedules() {
      const listContainer = document.getElementById('scheduleList');
      if (scheduleData.length === 0) {
        listContainer.innerHTML = '<p style="color: #9ca3af; font-size: 13px;">まだ時間帯が追加されていません。</p>';
        return;
      }

      listContainer.innerHTML = scheduleData.map(item => {
        const isOk = item.status === 'ok';
        const bgClass = isOk ? 'status-ok' : 'status-ng';
        const badge = isOk ? '🟢 全員OK（空き時間）' : '🔴 NG（誰か予定あり）';

        return `
          <div class="schedule-item ${bgClass}">
            <div>
              <div style="font-size: 11px; opacity: 0.8;">${item.date}</div>
              <div>⏰ ${item.time}</div>
            </div>
            <div style="font-size: 12px;">${badge}</div>
          </div>
        `;
      }).join('');
    }
  </script>

</body>
</html>
